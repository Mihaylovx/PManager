name: CI

on: [push]

defaults:
  run:
    working-directory: PManager-Backend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build
        run: ./gradlew build -x test

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Test
        run: ./gradlew test

  sonarqube-check:
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Compile
        run: ./gradlew classes
      - name: SonarQube analysis
        run: ./gradlew test jacocoTestReport sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  e2e:
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    defaults:
      run:
        working-directory: PManager-Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: PManager-Frontend/package-lock.json
      - name: Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: PManager-Frontend
          start: npm run dev
          wait-on: 'http://localhost:5173'
          wait-on-timeout: 60

  docker:
    runs-on: docker
    needs: [sonarqube-check, e2e]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: docker compose up --build -d