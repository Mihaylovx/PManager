services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: PManager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d PManager"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./PManager-Backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/PManager
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: test
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./PManager-Frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: